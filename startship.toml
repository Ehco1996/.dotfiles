# --- SSH / Remote indicator ---
[hostname]
ssh_only = true
format = "[$ssh_symbol$hostname]($style) "
style = "bold red"
ssh_symbol = "🖥 "

[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold yellow"
style_root = "bold red"

# --- Existing ---
[kubernetes]
disabled = false
style = "green"
symbol = "⛵ "

[[battery.display]]
style = "bold red"
threshold = 30

[gcloud]
disabled = true
