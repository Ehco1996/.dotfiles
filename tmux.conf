# --- Prefix (default: C-b) ---

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on

# --- Mouse (touch scrolling on mobile SSH) ---
set -g mouse on

# --- Status bar ---
set -g status-style "bg=default,fg=white"
set -g status-left-length 50
set -g status-right-length 50
set -g status-left "#[fg=black,bg=yellow,bold] #h #[default] #[fg=green,bold]#S "
set -g status-right "#{?SSH_CONNECTION,#[fg=black#,bg=red#,bold] SSH #[default] ,}#[fg=yellow]%m-%d %H:%M "
setw -g window-status-current-style "fg=cyan,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# --- Window title: show hostname ---
set -g set-titles on
set -g set-titles-string "[#h] #S:#W"
